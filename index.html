<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HIRA Online Form</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, "Noto Sans Thai", sans-serif;
      background: #f4f6f8;
      color: #111;
    }

    body {
      min-height: 100dvh;
    }

    .app {
      width: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      width: 100%;
      min-height: 100dvh;
      padding: 20px;
    }

    .screen.active {
      display: flex;
    }

    /* หน้าแรก */
    .home-screen {
      align-items: center;
      justify-content: center;
    }

    .home-card {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    .home-title {
      font-size: clamp(24px, 5vw, 38px);
      font-weight: 900;
      margin-bottom: 8px;
    }

    .home-subtitle {
      font-size: clamp(14px, 3vw, 18px);
      color: #666;
      margin-bottom: 28px;
    }

    .home-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .main-btn {
      width: 100%;
      min-height: 76px;
      border: none;
      border-radius: 18px;
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 800;
      cursor: pointer;
      background: #111;
      color: #fff;
      box-shadow: 0 6px 14px rgba(0,0,0,0.14);
    }

    .main-btn.secondary {
      background: #ffffff;
      color: #111;
      border: 2px solid #111;
    }

    .main-btn:active,
    .nav-btn:active,
    .home-link-btn:active,
    .hazard-btn:active {
      transform: scale(0.98);
    }

    /* หน้าฟอร์ม */
    .form-screen {
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
    }

    .form-header {
      width: 100%;
      max-width: 1100px;
      background: #fff;
      border-radius: 18px;
      padding: 14px 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .form-title {
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 900;
    }

    .home-link-btn {
      border: none;
      background: #f1f3f5;
      color: #111;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: clamp(14px, 2.5vw, 18px);
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .form-page {
      width: 100%;
      max-width: 1100px;
      flex: 1;
      min-height: 520px;
      background: #fff;
      border-radius: 18px;
      border: 1px solid #ddd;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 20px;
    }

    .page-content {
      width: 100%;
      min-height: 480px;
      border-radius: 14px;
    }

    .blank-area {
      width: 100%;
      height: 100%;
      min-height: 480px;
      border: 2px dashed #d8d8d8;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: clamp(20px, 5vw, 42px);
      font-weight: 800;
      text-align: center;
    }

    .hazard-page {
      width: 100%;
      min-height: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hazard-title {
      font-size: clamp(20px, 4vw, 32px);
      font-weight: 900;
      text-align: center;
      margin: 4px 0 8px 0;
    }

    .hazard-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .hazard-btn {
      width: 100%;
      min-height: 68px;
      border: 1px solid #d9d9d9;
      border-radius: 14px;
      background: #fff;
      color: #111;
      padding: 14px 16px;
      font-size: clamp(15px, 3.5vw, 20px);
      font-weight: 800;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.05);
      line-height: 1.35;
    }

    .hazard-btn:hover {
      background: #f8f9fa;
      border-color: #111;
    }

    .nav-bar {
      width: 100%;
      max-width: 1100px;
      background: #fff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-between;
      gap: 14px;
      position: sticky;
      bottom: 12px;
    }

    .nav-btn {
      flex: 1;
      min-height: 60px;
      border: none;
      border-radius: 14px;
      font-size: clamp(17px, 3.5vw, 24px);
      font-weight: 900;
      cursor: pointer;
    }

    .back-btn {
      background: #e9ecef;
      color: #111;
    }

    .next-btn {
      background: #111;
      color: #fff;
    }

    .submit-btn {
      background: #0b7a33;
      color: #fff;
    }

    @media (min-width: 768px) {
      .screen {
        padding: 32px;
      }

      .home-buttons {
        grid-template-columns: 1fr 1fr;
      }

      .form-page {
        min-height: 620px;
      }

      .blank-area,
      .hazard-page {
        min-height: 580px;
      }

      .hazard-grid {
        grid-template-columns: 1fr 1fr;
      }

      .nav-btn {
        max-width: 260px;
      }

      .nav-bar {
        justify-content: flex-end;
      }
    }

    @media (min-width: 1100px) {
      .hazard-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 480px) {
      .screen {
        padding: 12px;
      }

      .home-card {
        padding: 22px;
        border-radius: 20px;
      }

      .form-header {
        align-items: center;
      }

      .form-page {
        min-height: calc(100dvh - 230px);
        padding: 12px;
      }

      .blank-area,
      .hazard-page {
        min-height: calc(100dvh - 260px);
      }

      .nav-bar {
        bottom: 8px;
        padding: 10px;
      }

      .nav-btn {
        min-height: 56px;
      }

      .hazard-btn {
        min-height: 62px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- หน้าแรก -->
    <section id="homeScreen" class="screen home-screen active">
      <div class="home-card">
        <div class="home-title">HIRA Online System</div>
        <div class="home-subtitle">เลือกเมนูที่ต้องการใช้งาน</div>

        <div class="home-buttons">
          <button class="main-btn" type="button" onclick="openForm()">
            FR-SHE-50-114
          </button>

          <button class="main-btn secondary" type="button" onclick="openSavedData()">
            ข้อมูลที่บันทึก
          </button>
        </div>
      </div>
    </section>

    <!-- หน้าฟอร์ม FR-SHE-50-114 -->
    <section id="formScreen" class="screen form-screen">
      <div class="form-header">
        <div class="form-title">FR-SHE-50-114</div>

        <button class="home-link-btn" type="button" onclick="goHomeAndClear()">
          หน้าแรก
        </button>
      </div>

      <main class="form-page">
        <div id="pageContent" class="page-content"></div>
      </main>

      <div class="nav-bar">
        <button id="backBtn" class="nav-btn back-btn" type="button" onclick="goBack()">
          ย้อนกลับ
        </button>

        <button id="nextBtn" class="nav-btn next-btn" type="button" onclick="goNext()">
          ถัดไป
        </button>

        <button id="submitBtn" class="nav-btn submit-btn" type="button" onclick="submitData()" style="display:none;">
          ส่งข้อมูล
        </button>
      </div>
    </section>

  </div>

  <script>
    const totalPages = 2;
    let currentPage = 1;

    const homeScreen = document.getElementById("homeScreen");
    const formScreen = document.getElementById("formScreen");
    const pageContent = document.getElementById("pageContent");

    const nextBtn = document.getElementById("nextBtn");
    const submitBtn = document.getElementById("submitBtn");

    const hazardList = [
      "1. MECHANICAL HAZARDS (อันตรายเชิงกล)",
      "2. ELECTRICAL HAZARDS (อันตรายทางไฟฟ้า)",
      "3. THERMAL HAZARDS (อันตรายจากความร้อน)",
      "4. NOISE HAZARDS (อันตรายจากเสียงดัง)",
      "5. Confined Space (อันตรายจากที่อับอากาศ)",
      "6. RADIATION HAZARDS (อันตรายจากรังสี)",
      "7. MATERIAL / SUBSTANCES (วัสดุ/สารเคมีเป็นอันตราย) Harmful materials (วัสดุอันตราย)",
      "8. ERGONOMICS (การยศาสตร์) Postures / excessive efforts (ท่าทาง/ใช้แรงเกินกำลัง)",
      "9. FALLING OR EJECTED OBJECTS (วัตถุตกหล่น/กระเด็น)",
      "10. LOSS OF STABILITY / OVERTURNING (การล้มคว่ำ/เสียสมดุล)",
      "11. SLIP / TRIP / FALL (ลื่น/สะดุด/ตกจากที่สูง)"
    ];

    function showScreen(screenName) {
      homeScreen.classList.remove("active");
      formScreen.classList.remove("active");

      if (screenName === "home") {
        homeScreen.classList.add("active");
      }

      if (screenName === "form") {
        formScreen.classList.add("active");
      }
    }

    function openForm() {
      currentPage = 1;
      updatePage();
      showScreen("form");
    }

    function openSavedData() {
      alert("เมนูข้อมูลที่บันทึก จะทำในขั้นตอนถัดไป");
    }

    function updatePage() {
      if (currentPage === 1) {
        pageContent.innerHTML = `
          <div class="blank-area">
            หน้า 1
          </div>
        `;
      }

      if (currentPage === 2) {
        pageContent.innerHTML = `
          <div class="hazard-page">
            <div class="hazard-title">เลือกหมวดอันตราย</div>
            <div class="hazard-grid">
              ${hazardList.map((item, index) => `
                <button
                  class="hazard-btn"
                  type="button"
                  onclick="selectHazard(${index})"
                >
                  ${item}
                </button>
              `).join("")}
            </div>
          </div>
        `;
      }

      if (currentPage === totalPages) {
        nextBtn.style.display = "none";
        submitBtn.style.display = "block";
      } else {
        nextBtn.style.display = "block";
        submitBtn.style.display = "none";
      }

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    function goNext() {
      if (currentPage < totalPages) {
        currentPage++;
        updatePage();
      }
    }

    function goBack() {
      if (currentPage === 1) {
        goHomeAndClear();
        return;
      }

      currentPage--;
      updatePage();
    }

    function goHomeAndClear() {
      clearAllData();
      currentPage = 1;
      showScreen("home");
    }

    function clearAllData() {
      const inputs = document.querySelectorAll("input, textarea, select");

      inputs.forEach(el => {
        if (el.type === "checkbox" || el.type === "radio") {
          el.checked = false;
        } else {
          el.value = "";
        }
      });

      pageContent.innerHTML = "";
    }

    function selectHazard(index) {
      const selectedHazard = hazardList[index];
      alert("เลือก: " + selectedHazard);
    }

    function submitData() {
      alert("ส่งข้อมูลเรียบร้อยแล้ว ขั้นตอนถัดไปจะเชื่อม Google Drive");
    }
  </script>
</body>
</html>
