<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HIRA Online Form</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, "Noto Sans Thai", sans-serif;
      background: #f4f6f8;
      color: #111;
    }

    body { min-height: 100dvh; }

    .app {
      width: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      width: 100%;
      min-height: 100dvh;
      padding: 20px;
    }

    .screen.active { display: flex; }

    .home-screen {
      align-items: center;
      justify-content: center;
    }

    .home-card {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    .home-title {
      font-size: clamp(24px, 5vw, 38px);
      font-weight: 900;
      margin-bottom: 8px;
    }

    .home-subtitle {
      font-size: clamp(14px, 3vw, 18px);
      color: #666;
      margin-bottom: 28px;
    }

    .home-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .main-btn {
      width: 100%;
      min-height: 76px;
      border: none;
      border-radius: 18px;
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 800;
      cursor: pointer;
      background: #111;
      color: #fff;
      box-shadow: 0 6px 14px rgba(0,0,0,0.14);
    }

    .main-btn.secondary {
      background: #fff;
      color: #111;
      border: 2px solid #111;
    }

    .form-screen {
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
    }

    .form-header {
      width: 100%;
      max-width: 1100px;
      background: #fff;
      border-radius: 18px;
      padding: 14px 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .form-title {
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 900;
      line-height: 1.25;
    }

    .home-link-btn {
      border: none;
      background: #f1f3f5;
      color: #111;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: clamp(14px, 2.5vw, 18px);
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .form-page {
      width: 100%;
      max-width: 1100px;
      flex: 1;
      min-height: 520px;
      background: #fff;
      border-radius: 18px;
      border: 1px solid #ddd;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 20px;
    }

    .page-content {
      width: 100%;
      min-height: 480px;
      border-radius: 14px;
    }

    .section-title {
      font-size: clamp(20px, 4vw, 32px);
      font-weight: 900;
      text-align: center;
      margin: 4px 0 16px;
      line-height: 1.3;
    }

    .page-one,
    .hazard-page,
    .category-page {
      width: 100%;
      min-height: 480px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .input-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 800;
    }

    .required {
      color: #b00020;
      font-weight: 900;
    }

    .field input {
      width: 100%;
      min-height: 54px;
      border: 1px solid #d0d0d0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: clamp(16px, 3.5vw, 20px);
      outline: none;
      background: #fff;
    }

    .field input:focus,
    .hazard-note:focus {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
    }

    .help-text {
      font-size: 14px;
      color: #b00020;
      font-weight: 700;
      display: none;
    }

    .help-text.show { display: block; }

    .upload-section {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 4px;
    }

    .upload-box {
      width: 100%;
      min-height: 220px;
      border: 2px dashed #cfcfcf;
      border-radius: 18px;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      padding: 18px;
      overflow: hidden;
    }

    .upload-placeholder {
      color: #555;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .upload-icon {
      font-size: 52px;
      line-height: 1;
    }

    .upload-text {
      font-size: clamp(16px, 3.5vw, 22px);
      font-weight: 900;
    }

    .upload-note {
      font-size: clamp(13px, 2.8vw, 16px);
      color: #777;
    }

    .preview-img {
      width: 100%;
      height: 100%;
      max-height: 340px;
      object-fit: contain;
      border-radius: 12px;
    }

    .remove-image-btn {
      width: 100%;
      min-height: 54px;
      border: none;
      border-radius: 14px;
      background: #b00020;
      color: #fff;
      font-size: clamp(15px, 3vw, 18px);
      font-weight: 900;
      cursor: pointer;
      display: none;
    }

    .hazard-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .hazard-btn {
      width: 100%;
      min-height: 68px;
      border: 1px solid #d9d9d9;
      border-radius: 14px;
      background: #fff;
      color: #111;
      padding: 14px 16px;
      font-size: clamp(15px, 3.5vw, 20px);
      font-weight: 800;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.05);
      line-height: 1.35;
    }

    .hazard-btn:hover,
    .hazard-btn.has-data {
      background: #f8f9fa;
      border-color: #111;
    }

    .hazard-btn.has-data::after {
      content: " ✓";
      color: #0b7a33;
      font-weight: 900;
    }

    .hazard-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .hazard-card {
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      box-shadow: 0 3px 10px rgba(0,0,0,0.04);
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .hazard-title {
      font-size: clamp(15px, 3.4vw, 20px);
      font-weight: 900;
      line-height: 1.35;
    }

    .hazard-checks {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .check-item {
      min-width: 78px;
      background: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 16px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .check-item input {
      width: 20px;
      height: 20px;
      accent-color: #111;
      cursor: pointer;
    }

    .hazard-note {
      width: 100%;
      min-height: 48px;
      border: 1px solid #d0d0d0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: clamp(15px, 3vw, 18px);
      outline: none;
    }

    .nav-bar {
      width: 100%;
      max-width: 1100px;
      background: #fff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-between;
      gap: 14px;
      position: sticky;
      bottom: 12px;
    }

    .nav-btn {
      flex: 1;
      min-height: 60px;
      border: none;
      border-radius: 14px;
      font-size: clamp(17px, 3.5vw, 24px);
      font-weight: 900;
      cursor: pointer;
    }

    .back-btn { background: #e9ecef; color: #111; }
    .next-btn { background: #111; color: #fff; }
    .add-btn { background: #1f6feb; color: #fff; }
    .submit-btn { background: #0b7a33; color: #fff; }

    .next-btn:disabled,
    .submit-btn:disabled,
    .add-btn:disabled {
      background: #c9c9c9;
      color: #777;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .main-btn:active,
    .nav-btn:active,
    .home-link-btn:active,
    .hazard-btn:active,
    .upload-box:active {
      transform: scale(0.98);
    }

    @media (min-width: 768px) {
      .screen { padding: 32px; }

      .home-buttons { grid-template-columns: 1fr 1fr; }

      .form-page { min-height: 620px; }

      .page-one,
      .hazard-page,
      .category-page {
        min-height: 580px;
      }

      .input-grid { grid-template-columns: 1fr 1fr; }

      .upload-section {
        grid-template-columns: 1fr 220px;
        align-items: end;
      }

      .hazard-grid { grid-template-columns: 1fr 1fr; }

      .hazard-card {
        grid-template-columns: 1.2fr auto 1.2fr;
        align-items: center;
      }

      .nav-btn { max-width: 260px; }

      .nav-bar { justify-content: flex-end; }
    }

    @media (max-width: 480px) {
      .screen { padding: 12px; }

      .home-card {
        padding: 22px;
        border-radius: 20px;
      }

      .form-page {
        min-height: calc(100dvh - 230px);
        padding: 12px;
      }

      .page-one,
      .hazard-page,
      .category-page {
        min-height: calc(100dvh - 260px);
      }

      .nav-bar {
        bottom: 8px;
        padding: 10px;
      }

      .nav-btn { min-height: 56px; }

      .hazard-btn { min-height: 62px; }

      .upload-box { min-height: 180px; }
    }
  </style>
</head>

<body>
  <div class="app">

    <section id="homeScreen" class="screen home-screen active">
      <div class="home-card">
        <div class="home-title">HIRA Online System</div>
        <div class="home-subtitle">เลือกเมนูที่ต้องการใช้งาน</div>

        <div class="home-buttons">
          <button class="main-btn" type="button" onclick="openForm()">
            FR-SHE-50-114
          </button>

          <button class="main-btn secondary" type="button" onclick="openSavedData()">
            ข้อมูลที่บันทึก
          </button>
        </div>
      </div>
    </section>

    <section id="formScreen" class="screen form-screen">
      <div class="form-header">
        <div id="formTitle" class="form-title">FR-SHE-50-114</div>

        <button class="home-link-btn" type="button" onclick="goHomeAndClear()">
          หน้าแรก
        </button>
      </div>

      <main class="form-page">
        <div id="pageContent" class="page-content"></div>
      </main>

      <div id="navBar" class="nav-bar"></div>
    </section>

  </div>

  <script>
    const WEB_APP_URL = "ใส่_WEB_APP_URL_จาก_Google_Apps_Script_ตรงนี้";

    let currentPage = "basic";
    let activeCategoryIndex = null;
    let isSubmitting = false;

    const hazardCategories = [
      {
        id: "mechanical",
        title: "1. MECHANICAL HAZARDS (อันตรายเชิงกล)",
        items: [
          ["1.1", "Crushing (การหนีบ บดทับ)"],
          ["1.2", "Shearing (การเฉือน)"],
          ["1.3", "Cutting or severing (การตัด/เฉือนขาด)"],
          ["1.4", "Entanglement (การพันกัน)"],
          ["1.5", "Drawing-in or trapping (การดึงเข้า/การหนีบติด)"],
          ["1.6", "Impact / striking (การกระแทก/ถูกชน)"],
          ["1.7", "Stabbing / puncture (การแทง/ทิ่ม)"],
          ["1.8", "Friction / abrasion (เสียดสี/ขัดถู)"],
          ["1.9", "Fluids / materials ejection (การกระเด็นของของไหล/วัสดุ)"]
        ]
      },
      {
        id: "electrical",
        title: "2. ELECTRICAL HAZARDS (อันตรายทางไฟฟ้า)",
        items: [
          ["2.1", "Contact with live parts - Shock - Burn (สัมผัสส่วนที่มีกระแสไฟ)"],
          ["2.2", "Approach to live part under high voltage (เข้าใกล้แรงดันสูง)"],
          ["2.3", "Electrostatic phenomena (ไฟฟ้าสถิต)"],
          ["2.4", "Radiation (รังสีสนามแม่เหล็ก สนามไฟฟ้า)"],
          ["2.5", "Flash / arc eye (แสงอาร์ก)"]
        ]
      },
      {
        id: "thermal",
        title: "3. THERMAL HAZARDS (อันตรายจากความร้อน)",
        items: [
          ["3.1.1", "Burns / Scalds (แผลไหม้ / น้ำร้อนลวก)"],
          ["3.1.2", "Hot solid (ของแข็งร้อน)"],
          ["3.1.3", "Hot liquid (ของเหลวร้อน)"],
          ["3.1.4", "Hot gas (ก๊าซร้อน)"],
          ["3.1.5", "Friction (เสียดทานก่อความร้อน)"],
          ["3.1.6", "Sparks / particles (สะเก็ดไฟ / อนุภาค)"],
          ["3.2", "Hot / Cold environment (สภาพแวดล้อมร้อน / เย็นจัด)"]
        ]
      },
      {
        id: "noise",
        title: "4. NOISE HAZARDS (อันตรายจากเสียงดัง)",
        items: [
          ["4.1", "Noise (เสียงดัง)"],
          ["4.2", "Interference (รบกวนการสื่อสาร)"]
        ]
      },
      {
        id: "confinedSpace",
        title: "5. Confined Space (อันตรายจากที่อับอากาศ)",
        items: [
          ["5.1", "ขาดออกซิเจน"],
          ["5.2", "มีก๊าซพิษอื่นๆ"]
        ]
      },
      {
        id: "radiationHazards",
        title: "6. RADIATION HAZARDS (อันตรายจากรังสี)",
        items: [
          ["6.1", "Radiations X-Ray (รังสี)"]
        ]
      },
      {
        id: "materialSubstances",
        title: "7. MATERIAL / SUBSTANCES (วัสดุ / สารเคมีเป็นอันตราย) Harmful materials (วัสดุอันตราย)",
        items: [
          ["7.1.1", "Fluids (ของไหล)"],
          ["7.1.2", "Gas (แก๊ส)"],
          ["7.1.3", "Mists (ละอองลอย)"],
          ["7.1.4", "Fumes (ควัน / ไอระเหย)"],
          ["7.1.5", "Dusts (ฝุ่น)"],
          ["7.2.1", "Fire (ไฟไหม้)"],
          ["7.2.2", "Explosion (ระเบิด)"],
          ["7.3.1", "Biological (ชีวภาพ)"],
          ["7.3.2", "Shortage of oxygen (ขาดออกซิเจน)"]
        ]
      },
      {
        id: "ergonomics",
        title: "8. ERGONOMICS (การยศาสตร์) Postures / excessive efforts (ท่าทาง / ใช้แรงเกินกำลัง)",
        items: [
          ["8.1.1", "Handling (การจับยก / เคลื่อนย้าย)"],
          ["8.1.2", "Loads (น้ำหนักบรรทุก)"],
          ["8.1.3", "Push (การผลัก)"],
          ["8.1.4", "Pull (การดึง)"],
          ["8.2", "Extended reach (เอื้อมเกินระยะปลอดภัย)"],
          ["8.3", "Lighting (แสงสว่างไม่เพียงพอ)"],
          ["8.4", "Mental overload (ภาระงานทางจิตใจเกิน)"]
        ]
      },
      {
        id: "fallingEjectedObjects",
        title: "9. FALLING OR EJECTED OBJECTS (วัตถุตกหล่น / กระเด็น)",
        items: [
          ["9.1", "Falling / ejected objects (วัตถุตก / กระเด็น)"]
        ]
      },
      {
        id: "lossStability",
        title: "10. LOSS OF STABILITY / OVERTURNING (การล้มคว่ำ / เสียสมดุล)",
        items: [
          ["10.1", "Collapse (พังทลาย)"],
          ["10.2", "Overturn (ล้มคว่ำ)"],
          ["10.3", "Drop of entire equipment (อุปกรณ์ตกทั้งชิ้น)"],
          ["10.4", "Drop of part (ชิ้นส่วนตกหล่น)"]
        ]
      },
      {
        id: "slipTripFall",
        title: "11. SLIP / TRIP / FALL (ลื่น / สะดุด / ตกจากที่สูง)",
        items: [
          ["11.1", "Slip (ลื่น)"],
          ["11.2", "Fall same level (ล้มในระดับเดียวกัน)"],
          ["11.3", "Fall <2m (ตกจากที่สูง <2 เมตร)"],
          ["11.4", "Fall >2m (ตกจากที่สูง >2 เมตร)"],
          ["11.5", "Trip on step (สะดุดขั้นบันได)"],
          ["11.6", "Trip uneven floor (สะดุดพื้นต่างระดับ)"],
          ["11.7", "Trip over object (สะดุดวัตถุ)"]
        ]
      }
    ];

    const formData = {
      machineArea: "",
      model: "",
      plant: "",
      serialNo: "",
      intendFunction: "",
      reporterName: "",
      imageDataUrl: "",
      imageName: "",
      hazards: {}
    };

    const homeScreen = document.getElementById("homeScreen");
    const formScreen = document.getElementById("formScreen");
    const pageContent = document.getElementById("pageContent");
    const navBar = document.getElementById("navBar");
    const formTitle = document.getElementById("formTitle");

    initializeHazardData();

    function initializeHazardData() {
      formData.hazards = {};

      hazardCategories.forEach(category => {
        formData.hazards[category.id] = category.items.map(item => ({
          code: item[0],
          name: item[1],
          OP: 0,
          MT: 0,
          OT: 0,
          remark: ""
        }));
      });
    }

    function showScreen(screenName) {
      homeScreen.classList.remove("active");
      formScreen.classList.remove("active");

      if (screenName === "home") homeScreen.classList.add("active");
      if (screenName === "form") formScreen.classList.add("active");
    }

    function openForm() {
      currentPage = "basic";
      renderCurrentPage();
      showScreen("form");
    }

    function openSavedData() {
      alert("เมนูข้อมูลที่บันทึก จะทำในขั้นตอนถัดไป");
    }

    function renderCurrentPage() {
      if (currentPage === "basic") {
        formTitle.textContent = "FR-SHE-50-114";
        renderBasicPage();
        renderBasicNav();
      }

      if (currentPage === "hazardMenu") {
        formTitle.textContent = "เลือกหัวข้อ Hazard";
        renderHazardMenuPage();
        renderHazardMenuNav();
      }

      if (currentPage === "category") {
        renderCategoryPage(activeCategoryIndex);
        renderCategoryNav();
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderBasicPage() {
      pageContent.innerHTML = `
        <div class="page-one">
          <div class="section-title">ข้อมูลเบื้องต้น</div>

          <div class="input-grid">
            <div class="field">
              <label for="machineArea">MACHINE / พื้นที่ :</label>
              <input id="machineArea" type="text" value="${escapeHtml(formData.machineArea)}" />
            </div>

            <div class="field">
              <label for="model">MODEL :</label>
              <input id="model" type="text" value="${escapeHtml(formData.model)}" />
            </div>

            <div class="field">
              <label for="plant">PLANT :</label>
              <input id="plant" type="text" value="${escapeHtml(formData.plant)}" />
            </div>

            <div class="field">
              <label for="serialNo">SERIAL NO. :</label>
              <input id="serialNo" type="text" value="${escapeHtml(formData.serialNo)}" />
            </div>

            <div class="field">
              <label for="intendFunction">INTEND FUCTION (หน้าที่เครื่องจักร / ระบบ ) :</label>
              <input id="intendFunction" type="text" value="${escapeHtml(formData.intendFunction)}" />
            </div>

            <div class="field">
              <label for="reporterName">ชื่อผู้รายงาน : <span class="required">*</span></label>
              <input id="reporterName" type="text" value="${escapeHtml(formData.reporterName)}" />
              <div id="reporterHelp" class="help-text">
                กรุณากรอกชื่อผู้รายงาน ก่อนกดถัดไป
              </div>
            </div>
          </div>

          <div class="upload-section">
            <div class="upload-box" onclick="openImagePicker()">
              ${
                formData.imageDataUrl
                  ? `<img class="preview-img" src="${formData.imageDataUrl}" alt="รูปที่แนบ" />`
                  : `
                    <div class="upload-placeholder">
                      <div class="upload-icon">📷</div>
                      <div class="upload-text">แนบรูปภาพ</div>
                      <div class="upload-note">กดเพื่อเลือกรูปภาพได้ 1 รูปเท่านั้น</div>
                    </div>
                  `
              }
            </div>

            <button id="removeImageBtn" class="remove-image-btn" type="button" onclick="removeImage()">
              ลบรูปภาพ
            </button>

            <input
              id="imageInput"
              type="file"
              accept="image/*"
              style="display:none;"
              onchange="handleImageUpload(event)"
            />
          </div>
        </div>
      `;

      bindBasicInputs();

      const removeBtn = document.getElementById("removeImageBtn");
      if (removeBtn) {
        removeBtn.style.display = formData.imageDataUrl ? "block" : "none";
      }

      updateNextButtonState();
    }

    function renderHazardMenuPage() {
      pageContent.innerHTML = `
        <div class="hazard-page">
          <div class="section-title">เลือกหมวดอันตราย</div>

          <div class="hazard-grid">
            ${hazardCategories.map((category, index) => `
              <button
                class="hazard-btn ${categoryHasData(category.id) ? "has-data" : ""}"
                type="button"
                onclick="selectHazard(${index})"
              >
                ${category.title}
              </button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderCategoryPage(categoryIndex) {
      const category = hazardCategories[categoryIndex];
      const dataList = formData.hazards[category.id];

      formTitle.textContent = category.title;

      pageContent.innerHTML = `
        <div class="category-page">
          <div class="section-title">${category.title}</div>

          <div class="hazard-list">
            ${dataList.map((item, itemIndex) => `
              <div class="hazard-card">
                <div class="hazard-title">
                  ${item.code} ${item.name}
                </div>

                <div class="hazard-checks">
                  <label class="check-item">
                    <input
                      type="checkbox"
                      ${item.OP === 1 ? "checked" : ""}
                      onchange="setHazardCheck(${categoryIndex}, ${itemIndex}, 'OP', this.checked)"
                    />
                    OP
                  </label>

                  <label class="check-item">
                    <input
                      type="checkbox"
                      ${item.MT === 1 ? "checked" : ""}
                      onchange="setHazardCheck(${categoryIndex}, ${itemIndex}, 'MT', this.checked)"
                    />
                    MT
                  </label>

                  <label class="check-item">
                    <input
                      type="checkbox"
                      ${item.OT === 1 ? "checked" : ""}
                      onchange="setHazardCheck(${categoryIndex}, ${itemIndex}, 'OT', this.checked)"
                    />
                    OT
                  </label>
                </div>

                <input
                  class="hazard-note"
                  type="text"
                  placeholder="ใส่รายละเอียดเพิ่มเติม"
                  value="${escapeHtml(item.remark)}"
                  oninput="setHazardRemark(${categoryIndex}, ${itemIndex}, this.value)"
                />
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderBasicNav() {
      navBar.innerHTML = `
        <button class="nav-btn back-btn" type="button" onclick="goHomeAndClear()">
          ย้อนกลับ
        </button>

        <button id="nextBtn" class="nav-btn next-btn" type="button" onclick="goNextFromBasic()">
          ถัดไป
        </button>
      `;

      updateNextButtonState();
    }

    function renderHazardMenuNav() {
      navBar.innerHTML = `
        <button class="nav-btn back-btn" type="button" onclick="goBackToBasic()">
          ย้อนกลับ
        </button>
      `;
    }

    function renderCategoryNav() {
      navBar.innerHTML = `
        <button class="nav-btn add-btn" type="button" onclick="goBackToHazardMenu()">
          ระบุเพิ่ม
        </button>

        <button class="nav-btn submit-btn" type="button" onclick="submitData()">
          ส่งข้อมูล
        </button>
      `;
    }

    function bindBasicInputs() {
      bindInput("machineArea");
      bindInput("model");
      bindInput("plant");
      bindInput("serialNo");
      bindInput("intendFunction");
      bindInput("reporterName", true);
    }

    function bindInput(id, isReporter = false) {
      const el = document.getElementById(id);
      if (!el) return;

      el.addEventListener("input", function () {
        formData[id] = this.value;

        if (isReporter) updateNextButtonState();
      });
    }

    function updateNextButtonState() {
      const nextBtn = document.getElementById("nextBtn");
      const reporterHelp = document.getElementById("reporterHelp");

      if (!nextBtn) return;

      const isReporterFilled = formData.reporterName.trim() !== "";
      nextBtn.disabled = !isReporterFilled;

      if (reporterHelp) {
        reporterHelp.classList.toggle("show", !isReporterFilled);
      }
    }

    function goNextFromBasic() {
      if (formData.reporterName.trim() === "") {
        updateNextButtonState();
        return;
      }

      currentPage = "hazardMenu";
      renderCurrentPage();
    }

    function goBackToBasic() {
      currentPage = "basic";
      renderCurrentPage();
    }

    function goBackToHazardMenu() {
      currentPage = "hazardMenu";
      renderCurrentPage();
    }

    function selectHazard(index) {
      activeCategoryIndex = index;
      currentPage = "category";
      renderCurrentPage();
    }

    function setHazardCheck(categoryIndex, itemIndex, role, checked) {
      const categoryId = hazardCategories[categoryIndex].id;
      formData.hazards[categoryId][itemIndex][role] = checked ? 1 : 0;
    }

    function setHazardRemark(categoryIndex, itemIndex, value) {
      const categoryId = hazardCategories[categoryIndex].id;
      formData.hazards[categoryId][itemIndex].remark = value;
    }

    function categoryHasData(categoryId) {
      return formData.hazards[categoryId].some(item =>
        item.OP === 1 ||
        item.MT === 1 ||
        item.OT === 1 ||
        item.remark.trim() !== ""
      );
    }

    function buildHazardRows() {
      const rows = [];

      hazardCategories.forEach(category => {
        formData.hazards[category.id].forEach(item => {
          rows.push({
            categoryId: category.id,
            categoryTitle: category.title,
            code: item.code,
            name: item.name,
            remark: item.remark || "",
            OP: item.OP || 0,
            MT: item.MT || 0,
            OT: item.OT || 0
          });
        });
      });

      return rows;
    }

    function openImagePicker() {
      const imageInput = document.getElementById("imageInput");
      if (imageInput) imageInput.click();
    }

    async function handleImageUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      if (!file.type.startsWith("image/")) {
        alert("กรุณาเลือกไฟล์รูปภาพเท่านั้น");
        event.target.value = "";
        return;
      }

      try {
        const resized = await resizeImage(file, 1400, 0.78);
        const baseName = file.name.replace(/\.[^/.]+$/, "");

        formData.imageDataUrl = resized;
        formData.imageName = baseName + ".jpg";

        renderBasicPage();
      } catch (error) {
        alert("ไม่สามารถแนบรูปได้ กรุณาลองใหม่อีกครั้ง");
        console.error(error);
      }

      event.target.value = "";
    }

    function resizeImage(file, maxWidth, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = event => {
          const img = new Image();

          img.onload = () => {
            const scale = Math.min(1, maxWidth / img.width);
            const width = Math.round(img.width * scale);
            const height = Math.round(img.height * scale);

            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            resolve(canvas.toDataURL("image/jpeg", quality));
          };

          img.onerror = reject;
          img.src = event.target.result;
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function removeImage() {
      formData.imageDataUrl = "";
      formData.imageName = "";
      renderBasicPage();
    }

function submitData() {
  if (isSubmitting) return;

  if (!WEB_APP_URL || WEB_APP_URL.includes("ใส่_WEB_APP_URL")) {
    const payloadForTest = buildPayload();
    console.log("ยังไม่ได้ใส่ WEB_APP_URL ข้อมูลทดสอบ:", payloadForTest);
    alert("ยังไม่ได้ใส่ WEB_APP_URL จาก Google Apps Script กรุณาใส่ URL ก่อนใช้งานจริง");
    return;
  }

  const payload = buildPayload();

  try {
    isSubmitting = true;
    setSubmitLoading(true);

    submitToAppsScript(payload);

    alert("ส่งข้อมูลแล้ว กรุณาตรวจสอบ Google Sheet");
    goHomeAndClear();

  } catch (error) {
    console.error(error);
    alert("ส่งข้อมูลไม่สำเร็จ");
  } finally {
    isSubmitting = false;
    setSubmitLoading(false);
  }
}

function submitToAppsScript(payload) {
  const iframeName = "hiddenSubmitFrame";

  let iframe = document.getElementById(iframeName);
  if (!iframe) {
    iframe = document.createElement("iframe");
    iframe.name = iframeName;
    iframe.id = iframeName;
    iframe.style.display = "none";
    document.body.appendChild(iframe);
  }

  const form = document.createElement("form");
  form.method = "POST";
  form.action = WEB_APP_URL;
  form.target = iframeName;
  form.style.display = "none";

  const input = document.createElement("input");
  input.type = "hidden";
  input.name = "payload";
  input.value = JSON.stringify(payload);

  form.appendChild(input);
  document.body.appendChild(form);

  form.submit();

  setTimeout(() => {
    document.body.removeChild(form);
  }, 1000);
}

    function buildPayload() {
      return {
        basicInfo: {
          machineArea: formData.machineArea,
          model: formData.model,
          plant: formData.plant,
          serialNo: formData.serialNo,
          intendFunction: formData.intendFunction,
          reporterName: formData.reporterName
        },
        image: {
          name: formData.imageName,
          dataUrl: formData.imageDataUrl
        },
        hazardRows: buildHazardRows()
      };
    }

    function setSubmitLoading(isLoading) {
      const buttons = navBar.querySelectorAll("button");
      buttons.forEach(btn => {
        btn.disabled = isLoading;
      });

      const submitBtn = navBar.querySelector(".submit-btn");
      if (submitBtn) {
        submitBtn.textContent = isLoading ? "กำลังส่ง..." : "ส่งข้อมูล";
      }
    }

    function goHomeAndClear() {
      clearAllData();
      currentPage = "basic";
      activeCategoryIndex = null;
      showScreen("home");
    }

    function clearAllData() {
      formData.machineArea = "";
      formData.model = "";
      formData.plant = "";
      formData.serialNo = "";
      formData.intendFunction = "";
      formData.reporterName = "";
      formData.imageDataUrl = "";
      formData.imageName = "";
      initializeHazardData();

      pageContent.innerHTML = "";
      navBar.innerHTML = "";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
  </script>
</body>
</html>
