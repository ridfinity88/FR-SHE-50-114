<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FR-SHE-50-114 HIRA Online Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="toolbar no-print">
    <div>
      <strong>FR-SHE-50-114 HIRA Online Form</strong>
      <span class="hint">กรอกข้อมูลบนแบบฟอร์ม และแนบรูปได้ 1 รูป</span>
    </div>
  </div>

  <form id="hiraForm" autocomplete="off">
    <div id="page" class="page" aria-label="Hazard Identification and Risk Assessment form page">
      <!-- Fields are generated by app.js to keep all positions in one place. -->
    </div>
  </form>

  <div class="footer no-print">
    <p><b>หมายเหตุ:</b> ถ้ายังไม่ได้ตั้งค่า Google Apps Script ระบบจะดาวน์โหลดไฟล์ JSON แทนการส่งข้อมูลออนไลน์</p>
    <p id="saveStatus"></p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
